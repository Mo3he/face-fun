services:
  face-fun:
    # Use the prebuilt image published to GHCR. Run `docker compose pull` to
    # fetch it without building. To build locally instead, run
    # `docker compose up --build` (the build section below is used then).
    image: ghcr.io/mo3he/face-fun:latest
    build: .
    ports:
      - "8000:8000"
    environment:
      # Admin credentials for the locked settings tab (change these!).
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      # Optional initial values; everything is editable later from /admin.
      RTSP_URL: ${RTSP_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
    volumes:
      - facefun-data:/data
    restart: unless-stopped

volumes:
  facefun-data:
