name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Syntax & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Byte-compile sources
        run: python -m compileall app

      - name: Ruff lint
        run: |
          pip install ruff
          ruff check app

  docker-build:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        # Compiles dlib, so this is the slow but thorough check that the
        # container actually builds end to end.
        run: docker build -t face-fun:ci .
